name: Hourly ingest

on:
  schedule:
    - cron: '7 * * * *'
  workflow_dispatch:

concurrency:
  group: ingest
  cancel-in-progress: false

jobs:
  ingest:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - name: Run ingest
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          INGEST_BATCH_SIZE: '100'
        run: npm run ingest
      - name: Commit data changes
        run: |
          git config user.name "gb-ingest-bot"
          git config user.email "bot@georgiabooked.com"
          git add data/arrests.json
          if ! git diff --cached --quiet; then
            git commit -m "data: hourly ingest $(date -u +%Y-%m-%dT%H:%MZ)"
            git push
          else
            echo "No new data"
          fi
